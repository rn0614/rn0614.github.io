name: Move and Rename Files on Push

# push 이벤트가 발생할 때 실행
on:
  push:
    branches:
      - master  # master 브랜치에 푸시할 때 실행

jobs:
  move_files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.name 'rn0614'
          git config --global user.email 'rn0614@naver.com'

      - name: Move and Rename Files
        run: |
          # 오늘 날짜 형식 (YYYY-MM-DD)
          TODAY=$(date +"%Y-%m-%d")

          # calendar 폴더에 있는 모든 .md 파일을 _posts로 이동
          find github_open -type f -name '*.md' | while read FILE; do
            FILENAME=$(basename "$FILE" .md)  # 확장자 제거한 파일명
            NEW_FILENAME="${TODAY}-${FILENAME}.md"  # 새로운 파일명 생성

            # _posts 폴더로 파일 이동 및 파일명 변경
            mv "$FILE" "_posts/${NEW_FILENAME}"
          done

      - name: Commit and Push Changes
        run: |
          git add _posts/*.md
          git commit -m "Move and rename files on push"
          git push origin master  # 'master' 브랜치로 변경 사항 푸시
